# ==============================
# BASIC CONFIG
# ==============================
sonar.projectKey=auralbooks
sonar.projectName=AuralBooks
sonar.projectVersion=1.0

# ==============================
# SOURCE CONFIG
# ==============================
sonar.sources=backend,frontend
sonar.sourceEncoding=UTF-8

# ==============================
# JAVA (SPRING BOOT)
# ==============================
sonar.java.binaries=backend/**/target/classes
sonar.java.test.binaries=backend/**/target/test-classes

sonar.tests=backend
sonar.test.inclusions=**/*Test.java,**/*IT.java

# ==============================
# COVERAGE (JACOCO)
# ==============================
sonar.coverage.jacoco.xmlReportPaths=backend/**/target/site/jacoco/jacoco.xml

# ==============================
# FRONTEND (ANGULAR / TYPESCRIPT)
# ==============================
sonar.typescript.tsconfigPath=frontend/tsconfig.json

sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info

# ==============================
# EXCLUSIONS
# ==============================
sonar.exclusions=\
**/node_modules/**,\
**/dist/**,\
**/*.spec.ts,\
**/*.test.ts,\
**/target/**,\
**/*.config.js,\
**/migrations/**,\
**/db/**

# ==============================
# DUPLICATION
# ==============================
sonar.cpd.exclusions=\
**/dto/**,\
**/model/**

# ==============================
# QUALITY GATE
# ==============================
sonar.qualitygate.wait=true