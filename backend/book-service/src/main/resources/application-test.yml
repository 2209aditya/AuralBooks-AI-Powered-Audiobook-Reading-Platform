server:
  port: 8080

spring:
  application:
    name: book-service

  datasource:
    url: jdbc:postgresql://postgres:5432/auralbooks
    username: admin
    password: password

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  redis:
    host: redis
    port: 6379