global:
  namespace: auralbooks

image:
  repository: auralbooks/backend
  tag: latest

replicaCount: 3

service:
  type: ClusterIP
  port: 80

resources:
  requests:
    cpu: "250m"
    memory: "512Mi"
  limits:
    cpu: "1"
    memory: "1Gi"

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 20
  targetCPUUtilizationPercentage: 70