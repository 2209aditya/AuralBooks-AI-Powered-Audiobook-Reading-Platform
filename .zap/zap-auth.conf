# ==============================
# TARGET
# ==============================
target.url=http://auralbooks-service

# ==============================
# AUTH TYPE (FORM / API LOGIN)
# ==============================
auth.method=post

# Login endpoint (Spring Boot Auth API)
auth.login.url=http://auralbooks-service/api/v1/auth/login

# Login request payload
auth.login.body={
  "email": "test@auralbooks.com",
  "password": "password123"
}

# Content type
auth.login.headers=Content-Type: application/json

# ==============================
# TOKEN EXTRACTION (JWT)
# ==============================

# Regex to extract JWT token from response
auth.token.regex="accessToken":"([^"]+)"

# Header to use token
auth.token.header=Authorization
auth.token.prefix=Bearer 

# ==============================
# LOGGED IN INDICATOR
# ==============================

# Response indicator when logged in
auth.loggedin.regex="accessToken"

# ==============================
# CONTEXT (OPTIONAL)
# ==============================

# Include only API endpoints
context.include.regex=http://auralbooks-service/api/.*

# Exclude public endpoints if needed
context.exclude.regex=http://auralbooks-service/api/v1/public/.*

# ==============================
# SESSION MANAGEMENT
# ==============================
session.type=header

# ==============================
# USERS
# ==============================
user.name=zap-user

# ==============================
# SCAN SETTINGS
# ==============================
spider.maxDepth=5
ajaxSpider.enabled=true

# ==============================
# DEBUG
# ==============================
log.level=INFO